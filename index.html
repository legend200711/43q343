<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legend Chat</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#020814,#001a33,#003366);
  color:white;
}

header{
  text-align:center;
  padding:15px;
  background:rgba(0,0,0,.6);
  border-bottom:2px solid #00aaff;
}

#chat{
  height:70vh;
  overflow-y:auto;
  padding:15px;
}

.msg{
  background:#0b2545;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border-left:4px solid #00aaff;
}

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  gap:10px;
  padding:10px;
  background:#001122;
}

input{
  padding:12px;
  border:none;
  border-radius:8px;
  outline:none;
}

#name{width:120px;}
#message{flex:1;}

button{
  padding:12px 15px;
  background:#00aaff;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <h1>💙 Legend Chat 💙</h1>
</header>

<div id="chat"></div>

<div class="bottom">
  <input id="name" placeholder="Name">
  <input id="message" placeholder="Message">
  <button id="sendBtn">Send</button>
</div>

<!-- FIREBASE MODULE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOnAtWjIx-L5suOt6_26eAbgf3k4ggmb4",
  authDomain: "legend-chat-246fd.firebaseapp.com",
  databaseURL: "https://legend-chat-246fd-default-rtdb.firebaseio.com",
  projectId: "legend-chat-246fd",
  storageBucket: "legend-chat-246fd.firebasestorage.app",
  messagingSenderId: "365662264136",
  appId: "1:365662264136:web:ae013a89b0c49442a1f17d"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat");

// SEND MESSAGE
document.getElementById("sendBtn").onclick = () => {
  const name = document.getElementById("name").value || "Guest";
  const message = document.getElementById("message").value;

  if(!message.trim()) return;

  push(chatRef, {
    name: name,
    message: message,
    time: Date.now()
  });

  document.getElementById("message").value = "";
};

// RECEIVE MESSAGES
onChildAdded(chatRef, (data) => {
  const val = data.val();

  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<b>${val.name}</b><br>${val.message}`;

  document.getElementById("chat").appendChild(div);

  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
});

</script>

</body>
</html>
